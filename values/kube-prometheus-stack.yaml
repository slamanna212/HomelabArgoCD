# kube-prometheus-stack Helm values
# Homelab cluster: 3 control-plane + 4 worker nodes
# Cilium CNI (replaces kube-proxy)

# -- Prometheus --
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 18GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-sata
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    # Discover ServiceMonitors/PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

# -- Grafana --
grafana:
  admin:
    existingSecret: grafana-admin-secret
    passwordKey: admin-password
  defaultDashboardsTimezone: America/New_York
  defaultDashboardsEnabled: true
  initChownData:
    enabled: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  persistence:
    enabled: true
    storageClassName: longhorn-sata
    size: 5Gi
  sidecar:
    dashboards:
      searchNamespace: ALL
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

# -- Alertmanager --
alertmanager:
  alertmanagerSpec:
    replicas: 2
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-sata
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

# -- node-exporter --
nodeExporter:
  enabled: true

# -- kube-state-metrics --
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  replicas: 2

# -- Cilium-aware settings --
kubeProxy:
  enabled: false

defaultRules:
  rules:
    kubeProxy: false
