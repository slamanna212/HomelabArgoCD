deployment:
  replicas: 2

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
          topologyKey: kubernetes.io/hostname

service:
  additionalServices:
    monitoring:
      type: LoadBalancer

api:
  dashboard: true
  insecure: true

ports:
  traefik:
    expose:
      default: true
      monitoring: false
  # Existing entrypoints (migrated from Ansible)
  argocd:
    port: 9443
    exposedPort: 9443
    expose:
      default: true
      monitoring: false
    protocol: TCP
  longhorn:
    port: 8088
    exposedPort: 8088
    expose:
      default: true
      monitoring: false
    protocol: TCP
  rancher:
    port: 7443
    exposedPort: 7443
    expose:
      default: true
      monitoring: false
    protocol: TCP
  # Monitoring entrypoints
  grafana:
    port: 3000
    exposedPort: 3000
    expose:
      default: false
      monitoring: true
    protocol: TCP
  prometheus:
    port: 9090
    exposedPort: 9090
    expose:
      default: false
      monitoring: true
    protocol: TCP
  alertmanager:
    port: 9093
    exposedPort: 9093
    expose:
      default: false
      monitoring: true
    protocol: TCP

providers:
  kubernetesCRD:
    allowCrossNamespace: true
