apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord-config
    creationPolicy: Owner
    template:
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m

          route:
            receiver: discord
            group_by: [alertname, namespace, severity]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - matchers:
                  - alertname = Watchdog
                receiver: blackhole
              - matchers:
                  - severity = critical
                repeat_interval: 1h

          receivers:
            - name: discord
              discord_configs:
                - webhook_url: '{{ .discordWebhook }}'
                  title: '{{ `{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}` }}'
                  message: |-
                    {{ `{{ range .Alerts }}` }}
                    **Severity:** {{ `{{ .Labels.severity | toUpper }}` }}
                    **Namespace:** {{ `{{ .Labels.namespace }}` }}
                    {{ `{{ if .Annotations.summary }}` }}**Summary:** {{ `{{ .Annotations.summary }}{{ end }}` }}
                    {{ `{{ if .Annotations.description }}` }}**Description:** {{ `{{ .Annotations.description }}{{ end }}` }}
                    {{ `{{ end }}` }}
            - name: blackhole

          inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity = warning
              equal: [alertname, namespace]
  data:
    - secretKey: discordWebhook
      remoteRef:
        key: alertmanager-discord-webhook
