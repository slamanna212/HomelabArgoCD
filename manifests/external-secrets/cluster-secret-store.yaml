apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      tenantId: "e60059a9-5350-4ef9-82d8-0d023e158da9"
      vaultUrl: "https://slama-k8s.vault.azure.net/"
      authSecretRef:
        clientId:
          name: azure-sp-credentials
          namespace: external-secrets
          key: clientId
        clientSecret:
          name: azure-sp-credentials
          namespace: external-secrets
          key: clientSecret
